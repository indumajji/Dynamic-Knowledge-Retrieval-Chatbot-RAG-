<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAG Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">
    <div class="header">RAG Chatbot</div>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask about arrhythmia...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    const userText = input.value.trim();
    if (!userText) return;

    // Show user message
    chatBox.innerHTML += `<div class="message user">${userText}</div>`;
    input.value = "";

    // Show loading
    const loadingId = Date.now();
    chatBox.innerHTML += `<div id="${loadingId}" class="message bot">Typing...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ question: userText })
        });

        const data = await response.json();

        // Replace loading with real answer
        document.getElementById(loadingId).innerText = data.answer;

    } catch (error) {
        document.getElementById(loadingId).innerText = "Error: Server not responding.";
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
